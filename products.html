<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <h2>Fashion Hub</h2>
        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="cart.html">Cart</a>
        </nav>
    </header>

    <div class="container">

        <h2>Our Products</h2>

        <div class="products">

            <div class="card">
                <img src="./Image/image 02.jpg">
                <h3>T Shirt</h3>
                <p>Rs 990</p>
                <button onclick="addCart('T Shirt',20)">Add to Cart</button>
            </div>

            <div class="card">
                <img src="./Image/image 03.jpg" width="500px">
                <h3>Dress</h3>
                <p>$35</p>
                <button onclick="addCart('Dress',35)">Add to Cart</button>
            </div>

            <div class="card">
                <img src="./Image/image 04.jpg">
                <h3>Jeans</h3>
                <p>$40</p>
                <button onclick="addCart('Jeans',40)">Add to Cart</button>
            </div>
            <div class="card">
                <img src="./Image/image05.jpg">
                <h3>Shoes</h3>
                <p>$22</p>
                <button onclick="addCart('shoes',40)">Add to Cart</button>
            </div>
            <div class="card">
                <img src="./Image/image 06.jpg">
                <h3>rolex watches</h3>
                <p>$350</p>
                <button onclick="addCart('shrolex watches',40)">Add to Cart</button>
            </div>
            <div class="card">
                <img src="./Image/image 07.png">
                <h3>saree</h3>
                <p>$42</p>
                <button onclick="addCart('saree',40)">Add to Cart</button>
            </div>

        </div>
    </div>

    <script src="js/cart.js"></script>

</body>


</html>
